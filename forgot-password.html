<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wejhatna | Reset Password</title>
    <!-- هذا الرابط يستخدم نفس ملف التنسيق الخاص بصفحة تسجيل الدخول لتوحيد الشكل -->
    <link rel="stylesheet" href="stylesignin.css">
    <style>
        /*
         * هذا الكود مخصص فقط لتنسيق هذه الصفحة
         * وهو يضمن أن النموذج يظهر في منتصف الشاشة بشكل جميل
        */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f6f5f7; /* نفس لون خلفية صفحة تسجيل الدخول */
            font-family: 'Montserrat', sans-serif; /* استخدام خط متناسق */
        }
        .reset-container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .reset-container h1 {
            font-weight: bold;
            margin: 0 0 15px 0;
            font-size: 2em; /* حجم خط أكبر للعنوان */
        }
        .reset-container p {
            font-size: 14px;
            font-weight: 100;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
        }
        /* استعارة نفس تنسيق حقول الإدخال والأزرار من صفحة تسجيل الدخول */
        .reset-container input {
            background-color: #eee;
            border: none;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box; /* يضمن أن الـ padding لا يزيد من العرض */
            border-radius: 5px;
        }
        .reset-container button {
            border-radius: 20px;
            border: 1px solid #5d7a57;
            background-color: #5d7a57;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 80ms ease-in; /* تأثير بسيط عند الضغط */
        }
        .reset-container button:active {
            transform: scale(0.95);
        }
        .reset-container a.back-link {
            color: #333;
            font-size: 14px;
            text-decoration: none;
            margin: 15px 0;
            display: inline-block; /* يسمح بتطبيق margin-top */
        }
    </style>
</head>
<body>

<div class="reset-container">
    <h1>Forgot Your Password?</h1>
    <p>No problem. Enter your email address below and we will send you a link to reset it.</p>

    <form action="reset_request.php" method="post">
        <input type="email" name="email" placeholder="Enter your email address" required>
        <button type="submit">Send Reset Link</button>
    </form>

    <a href="sign.html" class="back-link">Back to Sign In</a>
</div>

</body>
</html>
